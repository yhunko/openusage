version = 1
name = "openusage"

[setup]
script = '''
#!/usr/bin/env bash
set -euo pipefail

# Install dependencies
bun install

# Sync config directories from source tree into the worktree
for d in .claude .codex .cursor; do
  if [ -d "$CODEX_SOURCE_TREE_PATH/$d" ]; then
    mkdir -p "$CODEX_WORKTREE_PATH/$d"
    rsync -a "$CODEX_SOURCE_TREE_PATH/$d/." "$CODEX_WORKTREE_PATH/$d/"
  fi
done

# Copy env file if it exists in the source tree
if [ -f "$CODEX_SOURCE_TREE_PATH/.env" ]; then
  cp "$CODEX_SOURCE_TREE_PATH/.env" "$CODEX_WORKTREE_PATH/.env"
fi

'''

[[actions]]
name = "Dev Server"
icon = "run"
command = "bun tauri dev"
